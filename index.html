<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Matt — Offensive Security Researcher</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #11111b; color: #cdd6f4; font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    a { color: inherit; }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    .card {
      position: relative;
      background: var(--mantle);
      border: 1px solid var(--surface0);
      border-radius: 8px;
      padding: 20px;
      display: flex; flex-direction: column;
      min-height: 210px;
      cursor: pointer;
      overflow: hidden;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--surface2);
      background: color-mix(in oklab, var(--surface0) 40%, var(--mantle));
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .card-enter {
      animation: cardIn .35s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 50% { opacity: 0.45; } }

    .cat-cell:hover {
      background: color-mix(in oklab, var(--surface0) 60%, var(--mantle)) !important;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Mobile */
    @media (max-width: 820px) {
      .hero-wrap { grid-template-columns: 1fr !important; gap: 28px !important; }
      .hero-stats { order: 2; }
      .sticky-nav { display: none !important; }
      .hide-sm { display: none !important; }
      .filter-row { padding: 10px 16px !important; }
      .drawer { width: 100vw !important; }
      main { padding: 16px 16px 60px !important; }
      section { padding-top: 28px !important; }
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data/repos.js"></script>
  <script src="data/features.js"></script>
</head>
<body>

<div id="root" class="density-cozy"></div>

<script type="text/babel" src="dossier.jsx"></script>

<script type="text/babel">
  const STORAGE_KEY = "matt-resume-prefs";
  const loadPrefs = () => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  };
  const savePrefs = (p) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
  };

  const App = () => {
    const initial = loadPrefs();
    const [theme, setTheme] = React.useState(initial.theme || "dark");
    const [density, setDensity] = React.useState(initial.density || "cozy");
    const [tweakOpen, setTweakOpen] = React.useState(false);

    React.useEffect(() => {
      const root = document.getElementById("root");
      root.className = `${theme === "light" ? "theme-light" : ""} density-${density}`.trim();
      document.body.style.background = theme === "light" ? "#eff1f5" : "#11111b";
      savePrefs({ theme, density });
    }, [theme, density]);

    return (
      <>
        <Dossier />

        <button
          onClick={() => setTweakOpen(o => !o)}
          aria-label="Toggle tweaks"
          style={{
            position: "fixed", right: 20, bottom: 20, zIndex: 9999,
            width: 40, height: 40, borderRadius: "50%",
            background: "var(--mantle)",
            border: "1px solid var(--surface1)",
            color: "var(--subtext0)",
            cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            boxShadow: "0 4px 12px rgba(0,0,0,0.3)",
          }}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

        {tweakOpen && (
          <div style={{
            position: "fixed", right: 20, bottom: 70, zIndex: 10000,
            width: 260, background: "var(--mantle)", color: "var(--text)",
            border: "1px solid var(--surface1)", borderRadius: 10,
            boxShadow: "0 10px 40px rgba(0,0,0,0.5)",
            padding: 16, fontFamily: '"Inter", system-ui, sans-serif', fontSize: 13,
          }}>
            <div style={{
              fontFamily: 'ui-monospace, "JetBrains Mono", Menlo, monospace',
              fontSize: 11, color: "var(--subtext0)", letterSpacing: 1,
              textTransform: "uppercase", marginBottom: 12,
              display: "flex", justifyContent: "space-between",
            }}>
              <span>Tweaks</span>
              <span style={{color:"var(--mauve)"}}>●</span>
            </div>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: "var(--subtext0)", marginBottom: 6, fontFamily: 'ui-monospace, Menlo, monospace' }}>theme</div>
              <div style={{ display: "flex", gap: 4 }}>
                {["dark", "light"].map(t => (
                  <button key={t} onClick={() => setTheme(t)}
                    style={{
                      flex: 1, padding: "6px 10px", fontSize: 12,
                      background: theme === t ? "var(--mauve)" : "transparent",
                      color: theme === t ? "var(--crust)" : "var(--text)",
                      border: "1px solid var(--surface1)", borderRadius: 4, cursor: "pointer",
                      fontFamily: 'ui-monospace, Menlo, monospace',
                    }}>{t}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 11, color: "var(--subtext0)", marginBottom: 6, fontFamily: 'ui-monospace, Menlo, monospace' }}>density</div>
              <div style={{ display: "flex", gap: 4 }}>
                {["compact", "cozy"].map(d => (
                  <button key={d} onClick={() => setDensity(d)}
                    style={{
                      flex: 1, padding: "6px 10px", fontSize: 12,
                      background: density === d ? "var(--mauve)" : "transparent",
                      color: density === d ? "var(--crust)" : "var(--text)",
                      border: "1px solid var(--surface1)", borderRadius: 4, cursor: "pointer",
                      fontFamily: 'ui-monospace, Menlo, monospace',
                    }}>{d}</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </>
    );
  };

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
